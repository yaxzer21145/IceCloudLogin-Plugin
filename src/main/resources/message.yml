main-command:
  help-header: "&6========== IceCloudLogin 帮助 =========="
  help-footer: "&6========================================="
  help-login: "&e/login <密码> &7- 登录服务器"
  help-register: "&e/register <密码> <重复密码> &7- 注册账号"
  help-captcha: "&e/captcha <验证码> &7- 验证验证码"
  help-mail: "&e/mail <邮箱> &7- 绑定邮箱"
  help-mailc: "&e/mailc <验证码> &7- 验证邮箱"
  help-qq: "&e/qq <QQ号> &7- 绑定QQ"
  help-qqc: "&e/qqc <验证码> &7- 验证QQ"
  help-logout: "&e/logout &7- 登出服务器"
  help-changepass: "&e/changepass <原密码> <新密码> &7- 修改密码"
  help-changemail: "&e/changemail <原邮箱> <新邮箱> &7- 修改邮箱"
  help-changeqq: "&e/changeqq <原QQ> <新QQ> &7- 修改QQ"
  help-mailzhpass: "&e/mailzhpass &7- 通过邮箱重置密码"
  help-qqzhpass: "&e/qqzhpass &7- 通过QQ重置密码"
  help-regdel: "&e/regdel <玩家> &7- 删除玩家注册(管理员)"
  help-reload: "&e/icecloudlogin reload &7- 重载配置(管理员)"
  help-version: "&e/icecloudlogin version &7- 查看版本"
  reload-success: "&a配置重载成功！"
  version: "&6IceCloudLogin &ev{version} &7- 作者: ya_xzer21145"

